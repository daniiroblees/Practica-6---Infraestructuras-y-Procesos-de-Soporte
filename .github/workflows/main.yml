name: CI Hospital Multi-job

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: '17', cache: maven }
      - run: chmod +x mvnw
      - run: ./mvnw compile --batch-mode

  test:
    needs: compile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: '17', cache: maven }
      - run: chmod +x mvnw
      # CAMBIO CLAVE: usamos verify para que ejecute los tests IT de Paciente
      - run: ./mvnw verify --batch-mode
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            target/surefire-reports/
            target/failsafe-reports/

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: '17', cache: maven }
      - run: chmod +x mvnw
      - run: ./mvnw -B clean package -DskipTests
      - uses: actions/upload-artifact@v4
        with: { name: app-jar, path: target/*.jar }